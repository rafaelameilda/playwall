<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV-Wall | Painel de TVs</title>
  <style>
    :root{color-scheme:dark;--bg:#070b14;--panel:#0f172a;--soft:#111c30;--line:#243047;--text:#e5edf8;--muted:#8fa0b8;--accent:#34d399;--danger:#fb7185}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0%,rgba(52,211,153,.09),transparent 28rem),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,select,a{font:inherit}
    .page{width:min(1680px,100%);margin:auto;padding:22px clamp(14px,3vw,38px) 60px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:20px}.eyebrow{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}h1{margin:5px 0 4px;font-size:clamp(22px,4vw,34px);line-height:1.08}.subtitle{margin:0;color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .button{min-height:38px;border:1px solid var(--line);border-radius:10px;padding:0 13px;background:var(--panel);color:var(--text);text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.button:hover{border-color:#3d506f;background:#152139}.button.primary{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.12);color:#a7f3d0}
    .toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr)) minmax(210px,1.4fr);gap:10px;margin-bottom:22px}.metric,.filter-box{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:13px;padding:13px 15px}.metric-label{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}.metric-value{margin-top:4px;font-size:23px;font-weight:800}.filter-box{display:flex;flex-direction:column;justify-content:center;gap:5px}.filter-box label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase}select{width:100%;border:0;outline:0;color:var(--text);background:transparent;font-weight:650}
    .status-line{display:flex;align-items:center;gap:7px;margin-bottom:15px;color:var(--muted);font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(52,211,153,.7)}.dot.error{background:var(--danger);box-shadow:0 0 12px rgba(251,113,133,.6)}
    .environment{margin-top:18px;border:1px solid var(--line);border-radius:17px;background:rgba(15,23,42,.55);overflow:hidden}.environment-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 17px;border-bottom:1px solid var(--line)}.environment-title{margin:0;font-size:16px}.environment-count{color:var(--muted);font-size:11px;white-space:nowrap}.environment-body{padding:clamp(12px,2vw,18px)}
    .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,460px),620px));justify-content:start;gap:15px}.group-card{min-width:0;border:1px solid var(--line);border-radius:14px;background:var(--soft);overflow:hidden}.group-head{display:flex;justify-content:space-between;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line)}.group-name{font-size:12px;font-weight:750}.group-grid-label{color:var(--muted);font-size:10px}.group-grid{display:grid;gap:3px;padding:3px;background:#02050a}
    .individual-section{margin-top:16px}.individual-title{margin:0 0 9px;color:var(--muted);font-size:11px;font-weight:750;letter-spacing:.08em;text-transform:uppercase}.individual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),380px));justify-content:start;gap:10px}
    .tv-screen{position:relative;display:block;min-width:0;aspect-ratio:1920/1090;overflow:hidden;border:1px solid #33415b;background:#000;color:inherit;text-decoration:none}.tv-screen:hover{border-color:var(--accent)}.tv-screen iframe{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none;background:#000}.tv-label{position:absolute;z-index:2;left:5px;right:5px;bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:5px;padding:4px 6px;border-radius:6px;color:#f8fafc;background:rgba(2,6,12,.75);backdrop-filter:blur(5px);font-size:clamp(7px,1.1vw,10px);line-height:1.15}.tv-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.tv-position{color:#a7f3d0;flex:0 0 auto}.empty-position{display:grid;place-items:center;color:#53627a;background:repeating-linear-gradient(135deg,#0a101b,#0a101b 8px,#0d1522 8px,#0d1522 16px);font-size:10px}.empty-state{padding:48px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:15px}.error-box{padding:18px;border:1px solid rgba(251,113,133,.35);border-radius:13px;color:#fecdd3;background:rgba(127,29,29,.16)}
    @media(max-width:760px){.topbar{flex-direction:column}.actions{width:100%}.actions .button{flex:1}.toolbar{grid-template-columns:repeat(3,1fr)}.filter-box{grid-column:1/-1}.metric{padding:10px}.metric-value{font-size:19px}.environment-head{align-items:flex-start}}
  </style>
</head>
<body>
<main class="page">
  <header class="topbar"><div><div class="eyebrow">TV-Wall Digital Signage</div><h1>Painel de TVs</h1><p class="subtitle">Visualização em tempo real por ambiente, grupo e posição.</p></div><div class="actions"><a class="button" href="dashboard.html">Voltar ao sistema</a><button class="button primary" id="refresh-button" type="button">Atualizar agora</button></div></header>
  <section class="toolbar" aria-label="Resumo do painel">
    <div class="metric"><div class="metric-label">Ambientes</div><div class="metric-value" id="metric-environments">—</div></div>
    <div class="metric"><div class="metric-label">Grupos</div><div class="metric-value" id="metric-groups">—</div></div>
    <div class="metric"><div class="metric-label">TVs ativas</div><div class="metric-value" id="metric-tvs">—</div></div>
    <div class="filter-box"><label for="environment-filter">Filtrar ambiente</label><select id="environment-filter"><option value="">Todos os ambientes</option></select></div>
  </section>
  <div class="status-line"><span class="dot" id="status-dot"></span><span id="status-text">Carregando painel…</span></div>
  <section id="wall-root"><div class="empty-state">Buscando TVs cadastradas…</div></section>
</main>
<script src="assets/js/config.js"></script>
<script>
(function(){
  'use strict';
  const REFRESH_MS=30000,PLAYER_URL='tv.html?id=';
  const root=document.getElementById('wall-root'),filter=document.getElementById('environment-filter'),statusText=document.getElementById('status-text'),statusDot=document.getElementById('status-dot');
  let dashboardData=null,dataSignature='',refreshTimer=null;
  function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
  function request(path){return fetch(API_BASE_URL+path,{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('Falha ao consultar '+path);return r.json()})}
  function preview(tv,pos){const name=esc(tv.nmTv||'TV sem nome'),position=pos==null?'':'<span class="tv-position">Pos. '+pos+'</span>',url=PLAYER_URL+encodeURIComponent(tv.id);return '<a class="tv-screen" href="'+url+'" target="_blank" title="Abrir '+name+'"><iframe src="'+url+'" title="Prévia de '+name+'" loading="eager" allow="autoplay"></iframe><span class="tv-label"><span class="tv-name">'+name+'</span>'+position+'</span></a>'}
  function groupCard(group,tvs){
    const cols=Math.max(Number(group.nrColunas)||1,1),rows=Math.max(Number(group.nrLinhas)||1,1),cells=new Array(cols*rows).fill(null),extras=[];
    tvs.forEach(function(tv){const pos=Number(tv.nrPosicaoGrupo);if(Number.isInteger(pos)&&pos>=0&&pos<cells.length&&!cells[pos])cells[pos]=tv;else extras.push(tv)});
    let html='<article class="group-card"><div class="group-head"><span class="group-name">'+esc(group.nmGrupo||'Grupo')+'</span><span class="group-grid-label">'+cols+' × '+rows+' · '+tvs.length+' TV(s)</span></div><div class="group-grid" style="grid-template-columns:repeat('+cols+',minmax(0,1fr));aspect-ratio:'+(1920*cols)+'/'+(1090*rows)+'">';
    cells.forEach(function(tv,i){html+=tv?preview(tv,i):'<div class="tv-screen empty-position">Pos. '+i+'</div>'});html+='</div>';
    if(extras.length)html+='<div class="individual-grid" style="padding:10px">'+extras.map(function(tv){return preview(tv,tv.nrPosicaoGrupo)}).join('')+'</div>';
    return html+'</article>'
  }
  function render(){
    if(!dashboardData)return;const selected=filter.value,environments=dashboardData.environments,groupsById=new Map(dashboardData.groups.map(function(g){return[String(g.id),g]})),activeTvs=dashboardData.tvs.filter(function(tv){return tv.stStatus==='A'});
    document.getElementById('metric-environments').textContent=environments.filter(function(e){return e.stStatus==='A'}).length;document.getElementById('metric-groups').textContent=dashboardData.groups.filter(function(g){return g.stStatus==='A'}).length;document.getElementById('metric-tvs').textContent=activeTvs.length;
    const visible=environments.filter(function(e){return e.stStatus==='A'&&(!selected||String(e.id)===selected)}),orphans=activeTvs.filter(function(tv){return!environments.some(function(e){return String(e.id)===String(tv.idAmbiente)})});if(orphans.length&&!selected)visible.push({id:'__none__',nmAmbiente:'Sem ambiente',stStatus:'A'});
    let html='';visible.forEach(function(env){const envTvs=env.id==='__none__'?orphans:activeTvs.filter(function(tv){return String(tv.idAmbiente)===String(env.id)}),grouped=new Map(),individual=[];envTvs.forEach(function(tv){if(tv.idGrupo==null)individual.push(tv);else{const key=String(tv.idGrupo);if(!grouped.has(key))grouped.set(key,[]);grouped.get(key).push(tv)}});
      html+='<section class="environment"><div class="environment-head"><h2 class="environment-title">'+esc(env.nmAmbiente||'Ambiente')+'</h2><span class="environment-count">'+envTvs.length+' TV(s)</span></div><div class="environment-body">';
      if(grouped.size){html+='<div class="groups">';grouped.forEach(function(tvs,id){html+=groupCard(groupsById.get(id)||{nmGrupo:'Grupo não encontrado',nrColunas:1,nrLinhas:tvs.length},tvs)});html+='</div>'}
      if(individual.length)html+='<div class="individual-section"><h3 class="individual-title">TVs individuais</h3><div class="individual-grid">'+individual.map(function(tv){return preview(tv,null)}).join('')+'</div></div>';
      if(!envTvs.length)html+='<div class="empty-state">Nenhuma TV ativa neste ambiente.</div>';html+='</div></section>'});root.innerHTML=html||'<div class="empty-state">Nenhum ambiente ativo encontrado.</div>'
  }
  function updateFilter(environments){const current=filter.value;filter.innerHTML='<option value="">Todos os ambientes</option>'+environments.filter(function(e){return e.stStatus==='A'}).map(function(e){return'<option value="'+e.id+'">'+esc(e.nmAmbiente)+'</option>'}).join('');filter.value=current}
  function load(force){statusText.textContent='Atualizando painel…';statusDot.classList.remove('error');return Promise.all([request('/tv/ambientes'),request('/tv/grupos'),request('/tv/tvs')]).then(function(r){const data={environments:r[0]||[],groups:r[1]||[],tvs:r[2]||[]},signature=JSON.stringify(data);dashboardData=data;updateFilter(data.environments);if(force||signature!==dataSignature)render();dataSignature=signature;statusText.textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}).catch(function(error){statusDot.classList.add('error');statusText.textContent='Não foi possível atualizar. As prévias abertas continuam funcionando.';if(!dashboardData)root.innerHTML='<div class="error-box">'+esc(error.message)+'</div>'})}
  filter.addEventListener('change',render);document.getElementById('refresh-button').addEventListener('click',function(){load(true)});load(true);refreshTimer=setInterval(function(){load(false)},REFRESH_MS);window.addEventListener('beforeunload',function(){clearInterval(refreshTimer)});
})();
</script>
</body>
</html>
